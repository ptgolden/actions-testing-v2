name: Normalize mondo-edit.obo

on:
  workflow_call:
    inputs:
      pr_branch:
        required: true
        type: string
      same_repo:
        required: true
        type: boolean
      pr_repo:
        required: true
        type: string
    outputs:
      pushed:
        description: "Whether normalization pushed a new commit"
        value: ${{ jobs.normalize_mondo_edit.outputs.pushed }}

jobs:
  normalize_mondo_edit:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.push.outputs.pushed }}
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.pr_repo }}
          ref: ${{ inputs.pr_branch }}
          fetch-depth: 1

      - name: Configure git
        if: ${{ inputs.same_repo }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Normalize PR file
        run: |
          cd src/ontology
          make NORM && mv NORM mondo-edit.obo

      - name: Commit and push if changed
        id: push
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- src/ontology/mondo-edit.obo; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.same_repo }}" = "true" ]; then
            git add src/ontology/mondo-edit.obo
            git commit -m "Normalize mondo-edit.obo"
            git push origin "HEAD:${{ inputs.pr_branch }}"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "::error file=src/ontology/mondo-edit.obo::mondo-edit.obo is not normalized. Fork PRs cannot be auto-normalized; please run 'make NORM && mv NORM mondo-edit.obo' and commit the result."
            git --no-pager diff -- src/ontology/mondo-edit.obo
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Trigger QC on normalized branch
        if: ${{ inputs.same_repo }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/qc.yaml/dispatches" \
            -f ref='${{ inputs.pr_branch }}' \
            -f inputs[sha]='${{ steps.push.outputs.sha }}'
