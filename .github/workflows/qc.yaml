name: Ontology QC
run-name: Ontology QC for PR #${{ inputs.pr_number }}

on:
  workflow_dispatch:
    inputs:
      sha:
        required: true
        type: string
      pr_number:
        required: true
        type: string

jobs:
  qc:
    name: Run ontology QC
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write

    steps:
      - name: Mark QC pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${{ inputs.sha }}" \
            -f state='pending' \
            -f context='required-qc-check' \
            -f description='Ontology QC is running' \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 1

      - name: Run ontology QC checks
        id: qc
        run: |
          cd src/ontology
          make test

      - name: Report QC status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.qc.outcome }}" = "success" ]; then
            state="success"
            description="Ontology QC passed"
          else
            state="failure"
            description="Ontology QC failed"
          fi

          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${{ inputs.sha }}" \
            -f state="$state" \
            -f context='required-qc-check' \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
